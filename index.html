<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A1525" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <title>Owen Jones - Software Engineer & AI Architect</title>
    <script>
      // GitHub Pages SPA redirect: restore path from 404.html redirect
      (function () {
        var p = window.location.search.slice(1).split('&').find(function (s) { return s.startsWith('p=') });
        if (p) {
          var path = decodeURIComponent(p.slice(2));
          window.history.replaceState(null, '', path || '/');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
